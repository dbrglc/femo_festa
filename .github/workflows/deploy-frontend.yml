name: Deploy Frontend

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

jobs:
  # Run on develop branch push OR manual workflow_dispatch with development environment
  deploy-dev:
    if: |
      (github.ref == 'refs/heads/develop' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    
    runs-on: ubuntu-latest
    environment: dev
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          audience: sts.amazonaws.com
          aws-region: ${{ vars.PUBLIC_AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.AWS_DEPLOY_ROLE_NAME }}

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend (Development)
        env:
          PUBLIC_API_URL: ${{ vars.PUBLIC_API_URL }}
          PUBLIC_WS_URL: ${{ vars.PUBLIC_WS_URL }}
          PUBLIC_COGNITO_CLIENT_ID: ${{ vars.PUBLIC_COGNITO_CLIENT_ID }}
          PUBLIC_COGNITO_DOMAIN: ${{ vars.PUBLIC_COGNITO_DOMAIN }}
          PUBLIC_COGNITO_REDIRECT_URI: ${{ vars.PUBLIC_COGNITO_REDIRECT_URI }}
          PUBLIC_AWS_REGION: ${{ vars.PUBLIC_AWS_REGION }}
        run: |
          cd frontend
          npm run build

      - name: Get CloudFront Distribution ID and S3 Bucket
        id: cdk-outputs
        run: |
          BUCKET_NAME=${{ vars.FRONTEND_BUCKET_NAME }}
          DIST_ID=${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}

      - name: Deploy to S3
        run: |
          aws s3 sync frontend/dist s3://${{ steps.cdk-outputs.outputs.bucket_name }} \
            --delete \
            --cache-control "public, max-age=3600" \
            --exclude ".git/*" \
            --exclude "node_modules/*"

      - name: Invalidate CloudFront cache
        if: steps.cdk-outputs.outputs.distribution_id != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.cdk-outputs.outputs.distribution_id }} \
            --paths "/*"

  # Run on main branch push OR manual workflow_dispatch with production environment
  deploy-prod:
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod')
    
    runs-on: ubuntu-latest
    environment: prod
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          audience: sts.amazonaws.com
          aws-region: ${{ vars.PUBLIC_AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.AWS_DEPLOY_ROLE_NAME }}

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend (Production)
        env:
          PUBLIC_API_URL: ${{ vars.PUBLIC_API_URL }}
          PUBLIC_WS_URL: ${{ vars.PUBLIC_WS_URL }}
          PUBLIC_COGNITO_CLIENT_ID: ${{ vars.PUBLIC_COGNITO_CLIENT_ID }}
          PUBLIC_COGNITO_DOMAIN: ${{ vars.PUBLIC_COGNITO_DOMAIN }}
          PUBLIC_COGNITO_REDIRECT_URI: ${{ vars.PUBLIC_COGNITO_REDIRECT_URI }}
          PUBLIC_AWS_REGION: ${{ vars.PUBLIC_AWS_REGION }}
        run: |
          cd frontend
          npm run build

      - name: Get CloudFront Distribution ID and S3 Bucket
        id: cdk-outputs
        run: |
          BUCKET_NAME=${{ vars.FRONTEND_BUCKET_NAME }}
          DIST_ID=${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}

      - name: Deploy to S3
        run: |
          aws s3 sync frontend/dist s3://${{ steps.cdk-outputs.outputs.bucket_name }} \
            --delete \
            --cache-control "public, max-age=3600" \
            --exclude ".git/*" \
            --exclude "node_modules/*"

      - name: Invalidate CloudFront cache
        if: steps.cdk-outputs.outputs.distribution_id != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.cdk-outputs.outputs.distribution_id }} \
            --paths "/*"
