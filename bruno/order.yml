info:
  name: order
  type: http
  seq: 4

http:
  method: POST
  url: "{{base-url}}/orders"
  body:
    type: json
    data: |-
      {
        "teamName": "a",
        "score": 12
      }
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: "{{login-auth-url}}"
    callbackUrl: "{{login-redirect-url}}"
    credentials:
      clientId: "{{login-client-id}}"
    tokenConfig:
      id: credentials
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
